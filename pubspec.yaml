name: notes_application
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  modal_progress_hud_nsn: ^0.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1

# إعدادات الأيقونة (توضع في نهاية الملف كقسم منفصل)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assests/images/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assests/images/icon.png"

flutter:
  uses-material-design: true

  # تأكد من إضافة مسار الصور هنا أيضاً لكي يتعرف عليها التطبيق
  assets:
    - assests/images/icon.png